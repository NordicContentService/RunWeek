<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Week Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #E8501A;
    --orange-light: #FFF0EB;
    --orange-mid: #FDDDD3;
    --bg: #EAEBEE;
    --card: #FFFFFF;
    --cell-bg: #F5F5F7;
    --text-primary: #1A1A1A;
    --text-secondary: #8A8A8E;
    --text-muted: #BCBCBE;
    --border: #EBEBED;
    --radius-cell: 10px;
    --radius-card: 20px;
    --font: 'DM Sans', sans-serif;
    --green: #1D9E75;
    --blue: #185FA5;
    --red-run: #D85A30;
    --purple: #9F5CC0;
    --gold: #BA7517;
    --gray: #888780;
    --gray-light: #B4B2A9;
    --overlay-bg: rgba(0,0,0,0.4);
  }

  [data-theme="dark"] {
    --bg: #111113;
    --card: #1C1C1E;
    --cell-bg: #2C2C2E;
    --text-primary: #F2F2F7;
    --text-secondary: #8E8E93;
    --text-muted: #48484A;
    --border: #3A3A3C;
    --orange-light: #3A1E0F;
    --orange-mid: #5A2A10;
    --overlay-bg: rgba(0,0,0,0.65);
  }

  body {
    background: var(--bg);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px;
    transition: background 0.2s;
  }

  .app {
    background: var(--card);
    border-radius: var(--radius-card);
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 560px;
    overflow: visible;
    transition: background 0.2s;
  }

  /* ── HEADER ── */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  .nav-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .nav-btn {
    background: var(--cell-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 7px 14px;
    font-size: 15px;
    font-family: var(--font);
    cursor: pointer;
    color: var(--text-primary);
    font-weight: 500;
    transition: background 0.15s;
  }

  .nav-btn:hover { background: var(--orange-light); border-color: var(--orange); }

  .month-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    min-width: 130px;
    text-align: center;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    align-items: center;
    padding: 10px 20px 8px;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 0;
    width: 100%;
    justify-content: space-between;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .toolbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
  }

  .saved-indicator {
    font-size: 12px;
    color: var(--green);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .saved-indicator.show { opacity: 1; }

  /* ── MENU BUTTON ── */
  .menu-btn {
    background: var(--cell-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    padding: 0;
    flex-shrink: 0;
  }

  .menu-btn:hover { background: var(--orange-light); border-color: var(--orange); }

  .menu-btn span {
    display: block;
    width: 14px;
    height: 2px;
    background: var(--text-secondary);
    border-radius: 2px;
    transition: background 0.15s;
  }

  .menu-btn:hover span { background: var(--orange); }

  /* ── DROPDOWN MENU ── */
  .dropdown {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    min-width: 200px;
    z-index: 100;
    overflow: hidden;
    display: none;
  }

  .dropdown.open { display: block; }

  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    font-size: 14px;
    font-family: var(--font);
    color: var(--text-primary);
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    transition: background 0.12s;
  }

  .dropdown-item:hover { background: var(--cell-bg); }

  .dropdown-item.danger { color: #D93025; }
  .dropdown-item.danger:hover { background: #FFF2F2; }

  [data-theme="dark"] .dropdown-item.danger:hover { background: #3A1010; }

  .dropdown-icon {
    font-size: 16px;
    width: 20px;
    text-align: center;
  }

  .dropdown-divider {
    height: 1px;
    background: var(--border);
    margin: 2px 0;
  }

  .theme-toggle-label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
  }

  .toggle-pill {
    width: 34px;
    height: 20px;
    background: var(--border);
    border-radius: 10px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle-pill.on { background: var(--orange); }

  .toggle-pill::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .toggle-pill.on::after { transform: translateX(14px); }

  /* ── CONFIRM ERASE BOX ── */
  .confirm-box {
    display: none;
    align-items: center;
    gap: 8px;
    background: #FFF5F5;
    border: 1px solid #FECDCD;
    border-radius: 10px;
    padding: 8px 14px;
    margin: 0 20px 10px;
  }

  [data-theme="dark"] .confirm-box { background: #3A1010; border-color: #7A2020; }

  .confirm-box.visible { display: flex; }
  .confirm-text { font-size: 13px; color: #D93025; flex: 1; }

  .confirm-yes {
    background: none;
    border: 1px solid #FECDCD;
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 13px;
    font-family: var(--font);
    font-weight: 500;
    color: #D93025;
    cursor: pointer;
  }

  .confirm-no {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text-secondary);
    cursor: pointer;
  }

  /* ── FOOTER ── */
  .app-footer {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    padding: 10px 20px 16px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  /* ── CALENDAR GRID ── */
  .cal-wrap { padding: 0 12px 12px; }

  .day-header-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr) 46px;
    gap: 3px;
    margin-bottom: 3px;
  }

  .day-hdr {
    font-size: 13px;
    font-weight: 600;
    color: var(--orange);
    text-align: center;
    padding: 4px 0;
    letter-spacing: 0.02em;
  }

  .day-hdr.dist-hdr { color: var(--text-muted); font-size: 11px; }

  .week-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr) 46px;
    gap: 3px;
    margin-bottom: 3px;
    align-items: stretch;
  }

  .day-cell {
    background: var(--cell-bg);
    border-radius: var(--radius-cell);
    padding: 5px 4px 4px;
    min-width: 0;
    overflow: hidden;
    border: 1.5px solid transparent;
    transition: border-color 0.15s;
  }

  .day-cell.empty-cell {
    background: transparent;
    border-color: transparent;
  }

  .day-cell.has-activity {
    border-top-width: 3px;
  }

  .day-num {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 3px;
    text-align: center;
    line-height: 19px;
    height: 19px;
  }

  .day-num.today {
    background: var(--orange);
    color: #fff;
    border-radius: 50%;
    width: 19px;
    height: 19px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    margin: 0 auto 3px;
  }

  select.sel {
    width: 100%;
    font-size: 11px;
    font-family: var(--font);
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--card);
    color: var(--text-primary);
    padding: 2px 2px;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    outline: none;
    margin-bottom: 2px;
  }

  select.sel:focus { border-color: var(--orange); }
  select.sel:disabled { opacity: 0.3; pointer-events: none; }

  /* ── WEEK KM CELL ── */
  .week-km {
    background: var(--cell-bg);
    border-radius: var(--radius-cell);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px 3px;
    gap: 1px;
  }

  .week-km.is-current {
    background: var(--orange-light);
    outline: 1.5px solid var(--orange);
  }

  .week-km.is-over {
    background: #FFF2F2;
    outline: 1.5px solid #FECDCD;
  }

  [data-theme="dark"] .week-km.is-over { background: #3A1010; }

  .wk-total { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .wk-total.over { color: #D93025; }
  .wk-lbl { font-size: 10px; color: var(--text-muted); }
  .wk-avg { font-size: 11px; font-weight: 600; margin-top: 2px; text-align: center; line-height: 1.2; }
  .wk-avg.normal { color: var(--orange); }
  .wk-avg.over { color: #D93025; }
  .wk-avg-lbl { font-size: 9px; color: var(--text-muted); text-align: center; }

  /* ── SUMMARY ── */
  .summary-section {
    margin: 4px 20px 20px;
    background: var(--cell-bg);
    border-radius: 14px;
    padding: 14px 16px;
  }

  .summary-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .history-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .legend-bar {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
  }

  .bar-label {
    font-size: 12px;
    color: var(--text-secondary);
    width: 46px;
    text-align: right;
    flex-shrink: 0;
  }

  .bar-track {
    flex: 1;
    height: 18px;
    background: var(--card);
    border-radius: 5px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 5px;
    background: #378ADD;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .bar-fill.top3 { background: var(--green); }

  .bar-km {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    width: 38px;
    flex-shrink: 0;
  }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--overlay-bg);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 18px;
    width: 100%;
    max-width: 420px;
    padding: 28px 24px 24px;
    box-shadow: 0 16px 64px rgba(0,0,0,0.2);
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: var(--cell-bg);
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 16px;
    cursor: pointer;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .modal-close:hover { background: var(--border); }

  .modal-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .modal-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 5px;
    margin-top: 14px;
    display: block;
  }

  .field-label:first-of-type { margin-top: 0; }

  .field-input, .field-textarea {
    width: 100%;
    background: var(--cell-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: var(--font);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
    resize: none;
  }

  .field-input:focus, .field-textarea:focus {
    border-color: var(--orange);
  }

  .field-textarea { min-height: 90px; }

  .send-btn {
    width: 100%;
    margin-top: 20px;
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .send-btn:hover { opacity: 0.88; }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg-status {
    font-size: 13px;
    text-align: center;
    margin-top: 10px;
    min-height: 18px;
    color: var(--text-secondary);
  }

  .msg-status.success { color: var(--green); }
  .msg-status.error { color: #D93025; }
</style>
</head>
<body>

<div class="app">
  <div class="app-header">
    <div class="nav-group">
      <button class="nav-btn" id="prevBtn">&#8592;</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="nav-btn" id="nextBtn">&#8594;</button>
    </div>
    <div class="toolbar-right" style="position:relative;">
      <span class="saved-indicator" id="savedIndicator">saved</span>
      <button class="menu-btn" id="menuBtn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="dropdown" id="dropdown">
        <button class="dropdown-item" id="menuContactBtn">
          <span class="dropdown-icon">&#9993;</span>
          Message Thomas
        </button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item" id="menuThemeBtn">
          <span class="theme-toggle-label">
            <svg id="sunIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;color:var(--text-secondary)"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <span class="toggle-pill" id="togglePill"></span>
            <svg id="moonIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;color:var(--text-secondary)"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </span>
        </button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item danger" id="menuEraseBtn">
          <span class="dropdown-icon">&#128465;</span>
          Erase all data
        </button>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="legend" id="legend"></div>
  </div>

  <div class="confirm-box" id="confirmBox">
    <span class="confirm-text">Erase all training data? This cannot be undone.</span>
    <button class="confirm-yes" id="confirmYes">Yes, erase</button>
    <button class="confirm-no" id="confirmNo">Cancel</button>
  </div>

  <div class="cal-wrap">
    <div class="day-header-row" id="dayHeaders"></div>
    <div id="calGrid"></div>
  </div>

  <div class="summary-section">
    <div class="summary-title">Previous 6 Weeks</div>
    <div class="history-meta">
      <span class="legend-bar" style="background:#1D9E75"></span> top 3 (used for avg)
      <span class="legend-bar" style="background:#378ADD"></span> other weeks
    </div>
    <div id="historyBars"></div>
  </div>

  <div class="app-footer">© 2026 Nordic Content Service</div>
</div>

<!-- Contact Modal -->
<div class="modal-overlay" id="contactOverlay">
  <div class="modal">
    <button class="modal-close" id="contactClose">&#10005;</button>
    <div class="modal-title">Message Thomas</div>
    <div class="modal-sub">Send a message to the creator of Run Week. He will reply to your email.</div>
    <label class="field-label">Your name</label>
    <input class="field-input" id="senderName" type="text" placeholder="Enter your name" autocomplete="name">
    <label class="field-label">Your email</label>
    <input class="field-input" id="senderEmail" type="email" placeholder="Enter your email address" autocomplete="email">
    <label class="field-label">Message</label>
    <textarea class="field-textarea" id="senderMessage" placeholder="Write your message here..."></textarea>
    <button class="send-btn" id="sendBtn">Send message</button>
    <div class="msg-status" id="msgStatus"></div>
  </div>
</div>

<script type="module" src="dist/app.js"></script>
</body>
</html>
