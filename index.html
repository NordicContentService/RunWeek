<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Week Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #E8501A;
    --orange-light: #FFF0EB;
    --orange-mid: #FDDDD3;
    --bg: #EAEBEE;
    --card: #FFFFFF;
    --cell-bg: #F5F5F7;
    --text-primary: #1A1A1A;
    --text-secondary: #8A8A8E;
    --text-muted: #BCBCBE;
    --border: #EBEBED;
    --radius-cell: 10px;
    --radius-card: 20px;
    --font: 'DM Sans', sans-serif;

    --green: #1D9E75;
    --blue: #185FA5;
    --red-run: #D85A30;
    --purple: #9F5CC0;
    --gold: #BA7517;
    --gray: #888780;
    --gray-light: #B4B2A9;
  }

  body {
    background: var(--bg);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px;
  }

  .app {
    background: var(--card);
    border-radius: var(--radius-card);
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 560px;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
  }

  .date-badge {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .date-day {
    font-size: 48px;
    font-weight: 600;
    color: var(--orange);
    line-height: 1;
  }

  .date-rest {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 1px;
  }

  .date-month {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .date-year {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .nav-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .nav-btn {
    background: var(--cell-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 7px 14px;
    font-size: 15px;
    font-family: var(--font);
    cursor: pointer;
    color: var(--text-primary);
    font-weight: 500;
    transition: background 0.15s;
  }

  .nav-btn:hover { background: var(--orange-light); border-color: var(--orange); }

  .month-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    min-width: 130px;
    text-align: center;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px 8px;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .erase-zone {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .saved-indicator {
    font-size: 12px;
    color: var(--green);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .saved-indicator.show { opacity: 1; }

  .erase-btn {
    background: none;
    border: 1px solid #FECDCD;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 13px;
    font-family: var(--font);
    color: #D93025;
    cursor: pointer;
    transition: background 0.15s;
  }

  .erase-btn:hover { background: #FFF2F2; }

  .confirm-box {
    display: none;
    align-items: center;
    gap: 8px;
    background: #FFF5F5;
    border: 1px solid #FECDCD;
    border-radius: 10px;
    padding: 8px 14px;
    margin: 0 20px 10px;
  }

  .confirm-box.visible { display: flex; }

  .confirm-text { font-size: 13px; color: #D93025; flex: 1; }

  .confirm-yes {
    background: none;
    border: 1px solid #FECDCD;
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 13px;
    font-family: var(--font);
    font-weight: 500;
    color: #D93025;
    cursor: pointer;
  }

  .confirm-no {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text-secondary);
    cursor: pointer;
  }

  /* ── CALENDAR GRID ── */
  .cal-wrap { padding: 0 12px 12px; }

  .day-header-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr) 46px;
    gap: 3px;
    margin-bottom: 3px;
  }

  .day-hdr {
    font-size: 13px;
    font-weight: 600;
    color: var(--orange);
    text-align: center;
    padding: 4px 0;
    letter-spacing: 0.02em;
  }

  .day-hdr.dist-hdr { color: var(--text-muted); font-size: 11px; }

  .week-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr) 46px;
    gap: 3px;
    margin-bottom: 3px;
    align-items: stretch;
  }

  .day-cell {
    background: var(--cell-bg);
    border-radius: var(--radius-cell);
    padding: 5px 4px 4px;
    min-width: 0;
    overflow: hidden;
    border: 1.5px solid transparent;
    transition: border-color 0.15s;
  }

  .day-cell.empty-cell {
    background: transparent;
    border-color: transparent;
  }

  .day-cell.has-activity {
    border-top-width: 3px;
  }

  .day-num {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 3px;
    text-align: center;
    line-height: 19px;
    height: 19px;
  }

  .day-num.today {
    background: var(--orange);
    color: #fff;
    border-radius: 50%;
    width: 19px;
    height: 19px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    margin: 0 auto 3px;
  }

  select.sel {
    width: 100%;
    font-size: 11px;
    font-family: var(--font);
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--card);
    color: var(--text-primary);
    padding: 2px 2px;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    outline: none;
    margin-bottom: 2px;
  }

  select.sel:focus { border-color: var(--orange); }
  select.sel:disabled { opacity: 0.3; pointer-events: none; }

  /* ── WEEK KM CELL ── */
  .week-km {
    background: var(--cell-bg);
    border-radius: var(--radius-cell);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px 3px;
    gap: 1px;
  }

  .week-km.is-current {
    background: var(--orange-light);
    outline: 1.5px solid var(--orange);
  }

  .week-km.is-over {
    background: #FFF2F2;
    outline: 1.5px solid #FECDCD;
  }

  .wk-total { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .wk-total.over { color: #D93025; }
  .wk-lbl { font-size: 10px; color: var(--text-muted); }
  .wk-avg { font-size: 11px; font-weight: 600; margin-top: 2px; text-align: center; line-height: 1.2; }
  .wk-avg.normal { color: var(--orange); }
  .wk-avg.over { color: #D93025; }
  .wk-avg-lbl { font-size: 9px; color: var(--text-muted); text-align: center; }

  /* ── SUMMARY ── */
  .summary-section {
    margin: 4px 20px 20px;
    background: var(--cell-bg);
    border-radius: 14px;
    padding: 14px 16px;
  }

  .summary-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .history-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .legend-bar {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
  }

  .bar-label {
    font-size: 12px;
    color: var(--text-secondary);
    width: 46px;
    text-align: right;
    flex-shrink: 0;
  }

  .bar-track {
    flex: 1;
    height: 18px;
    background: var(--card);
    border-radius: 5px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 5px;
    background: #378ADD;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .bar-fill.top3 { background: var(--green); }

  .bar-km {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    width: 38px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="app">
  <div class="app-header">
    <div class="date-badge">
      <div class="date-day" id="todayNum"></div>
      <div class="date-rest">
        <div class="date-month" id="todayMonth"></div>
        <div class="date-year" id="todayYear"></div>
      </div>
    </div>
    <div class="nav-group">
      <button class="nav-btn" id="prevBtn">&#8592;</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="nav-btn" id="nextBtn">&#8594;</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="legend" id="legend"></div>
    <div class="erase-zone">
      <span class="saved-indicator" id="savedIndicator">saved</span>
      <button class="erase-btn" id="eraseBtn">erase all</button>
    </div>
  </div>

  <div class="confirm-box" id="confirmBox">
    <span class="confirm-text">erase all training data? this cannot be undone.</span>
    <button class="confirm-yes" id="confirmYes">yes, erase</button>
    <button class="confirm-no" id="confirmNo">cancel</button>
  </div>

  <div class="cal-wrap">
    <div class="day-header-row" id="dayHeaders"></div>
    <div id="calGrid"></div>
  </div>

  <div class="summary-section">
    <div class="summary-title">Previous 6 Weeks</div>
    <div class="history-meta">
      <span class="legend-bar" style="background:#1D9E75"></span> top 3 (used for avg)
      <span class="legend-bar" style="background:#378ADD"></span> other weeks
    </div>
    <div id="historyBars"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'rwp7';

const ACTIVITIES = [
  { value: '', label: '—', color: 'transparent', hasKm: false },
  { value: 'easy', label: 'Easy run', color: '#1D9E75', hasKm: true },
  { value: 'long', label: 'Long run', color: '#185FA5', hasKm: true },
  { value: 'tempo', label: 'Tempo', color: '#D85A30', hasKm: true },
  { value: 'short_int', label: 'Short int.', color: '#9F5CC0', hasKm: true },
  { value: 'long_int', label: 'Long int.', color: '#BA7517', hasKm: true },
  { value: 'work', label: 'Work', color: '#888780', hasKm: false },
];
const ACT_MAP = Object.fromEntries(ACTIVITIES.map(a => [a.value, a]));
const KM_OPTIONS = ['—', ...Array.from({length: 50}, (_, i) => i + 1)];
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

let state = {};
let currentYear, currentMonth;
let saveTimer = null;

function k(y, m, d, f) { return `${y}_${m}_${d}_${f}`; }

function loadState() {
  try { const r = localStorage.getItem(STORAGE_KEY); state = r ? JSON.parse(r) : {}; } catch(e) { state = {}; }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); flashSaved(); } catch(e) {}
}
function flashSaved() {
  clearTimeout(saveTimer);
  const el = document.getElementById('savedIndicator');
  el.classList.add('show');
  saveTimer = setTimeout(() => el.classList.remove('show'), 1500);
}
function eraseAll() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  state = {};
  renderCalendar(); renderHistory();
}

function getAct(y, m, d) { return state[k(y,m,d,'act')] || ''; }
function getKm(y, m, d) { return state[k(y,m,d,'km')] || 0; }
function setAct(y, m, d, v) { state[k(y,m,d,'act')] = v; saveState(); }
function setKm(y, m, d, v) { state[k(y,m,d,'km')] = v; saveState(); }

function getDays(y, m) { return new Date(y, m+1, 0).getDate(); }
function getOffset(y, m) { let d = new Date(y,m,1).getDay(); return d===0?6:d-1; }
function getWeeks(y, m) { return Math.ceil((getDays(y,m) + getOffset(y,m)) / 7); }

function calcWeekKm(y, m, w) {
  const days = getDays(y,m), off = getOffset(y,m);
  let t = 0;
  for (let d=1; d<=days; d++) {
    if (Math.floor((d-1+off)/7) === w) t += getKm(y,m,d);
  }
  return t;
}

function getCurrentWeekIndex(y, m) {
  const today = new Date();
  if (today.getFullYear() !== y || today.getMonth() !== m) return -1;
  return Math.floor((today.getDate() - 1 + getOffset(y, m)) / 7);
}

function getPrev6Weeks(y, m) {
  let collected = [];
  let sy = y, sm = m;
  while (collected.length < 6) {
    sm--; if (sm<0){sm=11;sy--;}
    const wc = getWeeks(sy,sm);
    for (let w=wc-1; w>=0; w--) {
      const km = calcWeekKm(sy,sm,w);
      const off = getOffset(sy,sm);
      const startDay = Math.max(1, w*7 - off + 1);
      const d = new Date(sy, sm, startDay);
      collected.unshift({ km, label: d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}) });
      if (collected.length >= 6) break;
    }
  }
  return collected.slice(-6);
}

function calcAvg6Top3(y, m) {
  const weeks = getPrev6Weeks(y, m);
  if (!weeks.length) return { avg: 0, top3indices: new Set() };
  const sorted = [...weeks].map((w, i) => ({ km: w.km, i })).sort((a, b) => b.km - a.km);
  const top3 = sorted.slice(0, 3);
  const top3indices = new Set(top3.map(t => t.i));
  const avg = top3.length > 0 ? Math.round(top3.reduce((s, t) => s + t.km, 0) / top3.length) : 0;
  return { avg, top3indices };
}

function makeKmSelect(y, m, d, disabled, currentKm, rowRef, weekIdx, avg6) {
  const sel = document.createElement('select');
  sel.className = 'sel';
  sel.disabled = disabled;
  KM_OPTIONS.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i === 0 ? 0 : v;
    opt.textContent = i === 0 ? '—' : String(v);
    if ((i === 0 && currentKm === 0) || (i > 0 && v === currentKm)) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', function() {
    setKm(y, m, d, parseInt(this.value) || 0);
    updateWeekKm(weekIdx, rowRef, avg6);
    renderHistory();
  });
  return sel;
}

function renderLegend() {
  document.getElementById('legend').innerHTML = ACTIVITIES.filter(a=>a.value).map(a=>
    `<span class="legend-item"><span class="dot" style="background:${a.color}"></span>${a.label}</span>`
  ).join('');
}

function renderDayHeaders() {
  document.getElementById('dayHeaders').innerHTML =
    DAYS.map(d=>`<div class="day-hdr">${d}</div>`).join('') +
    '<div class="day-hdr dist-hdr"></div>';
}

function renderCalendar() {
  const y = currentYear, m = currentMonth;
  const now = new Date();
  document.getElementById('monthTitle').textContent =
    new Date(y,m,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});

  // Update date badge to show today if we're on the current month
  const isCurrentMonth = now.getFullYear() === y && now.getMonth() === m;
  document.getElementById('todayNum').textContent = isCurrentMonth ? now.getDate() : new Date(y,m,1).getDate();
  document.getElementById('todayMonth').textContent = new Date(y,m,1).toLocaleDateString('en-GB',{month:'long'});
  document.getElementById('todayYear').textContent = y;

  const days = getDays(y,m), off = getOffset(y,m), numWeeks = getWeeks(y,m);
  const today = new Date();
  const curWeekIdx = getCurrentWeekIndex(y, m);
  const { avg: avg6 } = calcAvg6Top3(y, m);
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  for (let w=0; w<numWeeks; w++) {
    const row = document.createElement('div');
    row.className = 'week-row';
    const isCurrent = (w === curWeekIdx);
    const wkm = calcWeekKm(y,m,w);
    const isOver = isCurrent && avg6 > 0 && wkm > avg6 * 1.1;

    for (let dow=0; dow<7; dow++) {
      const pos = w*7 + dow;
      const dayNum = pos - off + 1;
      const cell = document.createElement('div');

      if (dayNum < 1 || dayNum > days) {
        cell.className = 'day-cell empty-cell';
      } else {
        cell.className = 'day-cell';
        const act = getAct(y,m,dayNum);
        const km = getKm(y,m,dayNum);
        const actInfo = ACT_MAP[act] || ACT_MAP[''];
        if (act) {
          cell.classList.add('has-activity');
          cell.style.borderColor = actInfo.color;
        }

        const isTodayCell = today.getFullYear()===y && today.getMonth()===m && today.getDate()===dayNum;
        const numEl = document.createElement('div');
        numEl.className = 'day-num' + (isTodayCell?' today':'');
        numEl.textContent = dayNum;
        cell.appendChild(numEl);

        const actSel = document.createElement('select');
        actSel.className = 'sel';
        ACTIVITIES.forEach(a => {
          const opt = document.createElement('option');
          opt.value = a.value; opt.textContent = a.label;
          if (a.value === act) opt.selected = true;
          actSel.appendChild(opt);
        });

        const kmSel = makeKmSelect(y, m, dayNum, !actInfo.hasKm, km, row, w, avg6);

        actSel.addEventListener('change', function() {
          const newAct = this.value;
          setAct(y, m, dayNum, newAct);
          const info = ACT_MAP[newAct] || ACT_MAP[''];
          if (newAct) {
            cell.classList.add('has-activity');
            cell.style.borderColor = info.color;
          } else {
            cell.classList.remove('has-activity');
            cell.style.borderColor = 'transparent';
          }
          kmSel.disabled = !info.hasKm;
          if (!info.hasKm) { setKm(y,m,dayNum,0); kmSel.value = 0; }
          updateWeekKm(w, row, avg6);
          renderHistory();
        });

        cell.appendChild(actSel);
        cell.appendChild(kmSel);
      }
      row.appendChild(cell);
    }

    const kmCell = document.createElement('div');
    kmCell.className = 'week-km' + (isCurrent ? (isOver ? ' is-over' : ' is-current') : '');
    kmCell.dataset.week = w;
    kmCell.dataset.isCurrent = isCurrent ? '1' : '0';

    const totalEl = document.createElement('span');
    totalEl.className = 'wk-total' + (isOver ? ' over' : '');
    totalEl.textContent = wkm;
    const lblEl = document.createElement('span');
    lblEl.className = 'wk-lbl';
    lblEl.textContent = '';
    kmCell.appendChild(totalEl);
    kmCell.appendChild(lblEl);

    if (isCurrent) {
      const avgEl = document.createElement('div');
      avgEl.className = 'wk-avg ' + (isOver ? 'over' : 'normal');
      avgEl.textContent = avg6;
      const avgLbl = document.createElement('div');
      avgLbl.className = 'wk-avg-lbl';
      avgLbl.textContent = 'avg 6w';
      kmCell.appendChild(avgEl);
      kmCell.appendChild(avgLbl);
    }

    row.appendChild(kmCell);
    grid.appendChild(row);
  }
}

function updateWeekKm(w, row, avg6) {
  const cell = row.querySelector('.week-km');
  if (!cell) return;
  const isCurrent = cell.dataset.isCurrent === '1';
  const wkm = calcWeekKm(currentYear, currentMonth, w);
  const isOver = isCurrent && avg6 > 0 && wkm > avg6 * 1.1;
  const totalEl = cell.querySelector('.wk-total');
  if (totalEl) { totalEl.textContent = wkm; totalEl.className = 'wk-total' + (isOver ? ' over' : ''); }
  if (isCurrent) {
    cell.className = 'week-km ' + (isOver ? 'is-over' : 'is-current');
    const avgEl = cell.querySelector('.wk-avg');
    if (avgEl) avgEl.className = 'wk-avg ' + (isOver ? 'over' : 'normal');
  }
}

function renderHistory() {
  const weeks = getPrev6Weeks(currentYear, currentMonth);
  const { top3indices } = calcAvg6Top3(currentYear, currentMonth);
  const maxKm = Math.max(...weeks.map(w=>w.km), 1);
  document.getElementById('historyBars').innerHTML = weeks.map((w, i)=>`
    <div class="bar-row">
      <span class="bar-label">${w.label}</span>
      <div class="bar-track">
        <div class="bar-fill ${top3indices.has(i) ? 'top3' : ''}" style="width:${Math.round((w.km/maxKm)*100)}%"></div>
      </div>
      <span class="bar-km">${w.km}</span>
    </div>
  `).join('');
}

function init() {
  loadState();
  const now = new Date();
  currentYear = now.getFullYear(); currentMonth = now.getMonth();

  document.getElementById('prevBtn').addEventListener('click', ()=>{
    currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;}
    renderCalendar(); renderHistory();
  });
  document.getElementById('nextBtn').addEventListener('click', ()=>{
    currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;}
    renderCalendar(); renderHistory();
  });
  document.getElementById('eraseBtn').addEventListener('click', ()=>{
    document.getElementById('confirmBox').classList.add('visible');
  });
  document.getElementById('confirmNo').addEventListener('click', ()=>{
    document.getElementById('confirmBox').classList.remove('visible');
  });
  document.getElementById('confirmYes').addEventListener('click', ()=>{
    document.getElementById('confirmBox').classList.remove('visible');
    eraseAll();
  });

  renderLegend(); renderDayHeaders(); renderCalendar(); renderHistory();
}
init();
</script>
</body>
</html>
